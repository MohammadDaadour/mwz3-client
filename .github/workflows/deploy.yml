name: Deploy NextJS Client

on:
  push:
    branches:
      - main

jobs:
   deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: mwz3-admin
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /srv/mwz3-client
            git pull origin main
            npm install
            npm run build
            sudo pm2 restart mwz3client